<nav class="flex w-full h-8 text-primary select-none bg-background">
    <div data-tauri-drag-region class="flex-1 h-full flex items-center px-3">
      <span class="text-sm font-medium">Keychange</span>
    </div>

     <button (click)="goToSettings()"
        class="flex items-center justify-center w-8 h-full hover:bg-white/10 transition-colors text-grey">
        <mat-icon style="font-size: 16px; width: 16px; height: 16px; color: grey;">settings</mat-icon>
    </button>
    
    <button (click)="minimize()" 
      class="flex items-center justify-center w-12 h-full hover:bg-white/10 transition-colors">
      <svg width="10" height="1" viewBox="0 0 10 1" fill="currentColor">
        <rect width="10" height="1"/>
      </svg>
    </button>
  
    <button (click)="close()" 
      class="flex items-center justify-center w-12 h-full hover:bg-red-500 transition-colors">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1">
        <line x1="0" y1="0" x2="10" y2="10"/>
        <line x1="10" y1="0" x2="0" y2="10"/>
      </svg>
    </button>
</nav>
