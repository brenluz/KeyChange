<div class="text-primary flex flex-col h-full pb-4 bg-background">
    <div class="flex items-center gap-3 pt-8 px-6 pb-6">
        <button (click)="goBack()" class=" hover:text-white transition-colors">
            <mat-icon style="font-size: 16px; width: 16px; height: 16px; color: grey;">arrow_back</mat-icon>
        </button>
        <h2 class="text-xl">Settings</h2>
    </div>

    <div class="flex flex-col gap-2 px-4 flex-1 overflow-y-auto">
        <div class="bg-surface rounded p-4 flex flex-col gap-4">
            <h3 class="text-sm font-medium text-muted">Appearance</h3>
            <div class="flex items-center justify-between">
                <span class="text-sm">Theme</span>    
                <select [(ngModel)]="settings.theme" (ngModelChange)="onThemeChange()"
                class="bg-border text-sm px-3 py-1.5 rounded outline-none text-primary">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>

            <div class="flex items-center justify-between">
                <span class="text-sm">Language</span>
                <select [(ngModel)]="settings.language" (ngModelChange)="onLanguageChange()"
                class="bg-border text-sm px-3 py-1.5 rounded outline-none text-primary">
                    @for (lang of languages; track lang.label) {
                        <option [value]="lang.label">{{ lang.code }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="bg-surface rounded p-4 flex flex-col gap-4">
            <h3 class="text-sm font-medium text-muted">System</h3>
            <div class="flex items-center justify-between">
                <span class="text-sm">Start on startup</span>
                <input type="checkbox" [(ngModel)]="settings.startOnStartup" (change)="onStartupChange()"
                 class="w-4 h-4 accent-blue-500 cursor-pointer">
            </div>
        </div>


         <div class="bg-surface rounded p-4 flex flex-col gap-4">
            <h3 class="text-sm font-medium text-muted">Data</h3>
            <div class="flex items-center justify-between">
                <span class="text-sm">Export keybinds</span>
                <button (click)="exportKeybinds()"
                    class="bg-border hover:bg-muted text-sm px-3 py-1.5 rounded transition-colors">
                    Export
                </button>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-sm">Import keybinds</span>
                <button (click)="importKeybinds()"
                    class="bg-border hover:bg-muted text-sm px-3 py-1.5 rounded transition-colors">
                    Import
                </button>
            </div>
        </div>

         <div class="bg-surface rounded p-4 flex flex-col gap-4">
            <h3 class="text-sm font-medium text-muted">Danger zone</h3>
            <div class="flex items-center justify-between">
                <span class="text-sm">Quit application</span>
                <button (click)="quit()"
                    class="bg-red-400 hover:bg-red-600 text-sm px-3 py-1.5 rounded transition-colors">
                    Quit
                </button>
            </div>
        </div>
    </div>
</div>
