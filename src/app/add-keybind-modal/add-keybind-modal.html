@if (isOpen) {
    <div class="fixed inset-0 bg-background flex items-center justify-center z-50"
        (click)="close()">
        <div class="bg-surface rounded p-6 w-80 flex flex-col gap-4"
            (click)="$event.stopPropagation()">

            <h3 class="text-lg font-medium text-primary">Add Keybind</h3>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Name</label>
                <input
                    type="text"
                    [(ngModel)]="newName"
                    class="bg-surface-2 text-sm px-3 py-2 rounded outline-none focus:ring-1 focus:ring-accenthover text-primary"
                />
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Key Combo</label>
                <div
                    tabindex="0"
                    (keydown)="recordKey($event)"
                    (keyup)="stopRecording($event)"
                    (focus)="recording = true"
                    (blur)="recording = false; pressedKeys.clear()"
                    class="bg-surface-2 text-sm px-3 py-2 rounded outline-none focus:ring-1 focus:ring-accenthover cursor-pointer font-jetbrainsmono text-primary">

                    {{ newKeyCombo || (recording ? 'Press keys...' : 'Click to record') }}
                </div>
                @if (recording) {
                    <p class="text-xs" [class.text-zinc-400]="isValidCombo" [class.text-red-400]="!isValidCombo">
                        {{ isValidCombo ? '✓ Valid combo' : 'Needs at least one modifier (Ctrl, Alt, Shift) and one key' }}
                    </p>
    }
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Action</label>
                <button (click)="pickerOpen = true" class="bg-surface-2 text-sm px-3 py-2 rounded text-left hover:bg-accent transition-colors"  
                [class.text-zinc-400]="!newAction"
                [class.text-primary]="newAction">
                    {{ newAction || 'Choose an App...'}}
                </button>
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button (click)="close()"
                    class="text-sm px-4 py-2 rounded bg-surface-2 hover:bg-zinc-600 transition-colors text-primary">
                    Cancel
                </button>
                <button (click)="save()"
                    [disabled]="!newName || !newKeyCombo || !newAction || !isValidCombo"
                    class="text-sm px-4 py-2 rounded bg-accent hover:bg-accenthover disabled:opacity-40 disabled:cursor-not-allowed transition-colors text-primary">
                    Save
                </button>
            </div>
        </div>
    </div>
}

<app-app-picker-modal
    [isOpen]="pickerOpen"
    (closed)="pickerOpen = false"
    (appSelected)="onAppSelected($event)"
/>
